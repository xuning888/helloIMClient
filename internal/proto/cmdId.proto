syntax = "proto3";

package helloim.protocol;


option java_package = "com.github.xuning888.helloim.common.protobuf";
option java_outer_classname = "MsgCmd";
option go_package = "github.com/xuning888/helloIMClient/internal/proto;helloim_proto";


enum CmdId {
  CMD_ID_DEFAULT = 0;
  CMD_ID_ECHO = 1; // echo
  CMD_ID_AUTH = 2; // AUTH
  CMD_ID_HEARTBEAT = 3; // 心跳

  CMD_ID_SEND = 1010; // send上行
  CMD_ID_PUSH = 1011; // push下行
}